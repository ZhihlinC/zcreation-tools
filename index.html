<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZCreation Tools</title>
  <meta name="description" content="Small tools for sound designers, by ZCreation.">
  <link rel="canonical" href="https://tools.zcreation.art/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f3f6;
      --fg: #2a2a2a;
      --muted: #777;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --panel-border: rgba(0, 0, 0, 0.1);
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 3px 14px rgba(0, 0, 0, 0.1);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Helvetica Neue", "Noto Sans TC", sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 5rem 1.5rem 2rem;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.6;
    }
    h1 {
      font-weight: 500;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      margin: 0 0 0.25rem;
    }
    .lede {
      color: var(--muted);
      margin: 0 0 2.5rem;
    }
    .tools {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .tool-card {
      display: block;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.1rem 1.3rem;
      color: var(--fg);
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }
    .tool-card:hover,
    .tool-card:focus-visible {
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
      background: #ffffff;
    }
    .tool-card:focus-visible {
      outline: 2px solid rgba(60, 100, 220, 0.4);
      outline-offset: 2px;
    }
    .tool-card h2 {
      margin: 0 0 0.3rem;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .tool-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
    footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a { color: var(--fg); }
    footer a:hover { color: #000; }
  </style>
</head>
<body>
  <h1>ZCreation Tools</h1>
  <p class="lede">Small tools for sound designers.</p>
  <div class="tools">
    <a href="/coverage/" class="tool-card">
      <h2>Sound Coverage Sketch</h2>
      <p>Plan multichannel speaker layouts: visualize cone coverage on the audience plane and check Pulkki-VBAP layout health.</p>
    </a>
  </div>
  <footer>
    By <a href="https://zcreation.art">ZCreation</a>.
  </footer>
</body>
</html>
